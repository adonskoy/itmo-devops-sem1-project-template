services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    environment:
      POSTGRES_DB: project-sem-1
      POSTGRES_USER: validator
      POSTGRES_PASSWORD: val1dat0r
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validator -d project-sem-1"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    platform: linux/amd64
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: validator
      DB_PASSWORD: val1dat0r
      DB_NAME: project-sem-1
    depends_on:
      postgres:
        condition: service_healthy
